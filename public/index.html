<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#080B14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SIGNAL — Research Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --abyss:#080B14; --panel:#111A2C; --panel-2:#182242; --panel-glass:rgba(17,26,44,0.82);
    --hairline:#26314F; --hairline-soft:#1A2440;
    --frost:#EAF0FF; --mist:#8B96B8; --mist-dim:#5A6688;
    --cyan:#4FE3D0; --cyan-dim:#1F6B62; --cyan-soft:rgba(79,227,208,0.12);
    --violet:#9B7BFF; --violet-dim:#4B3B8C; --violet-soft:rgba(155,123,255,0.12);
    --flare:#FF6B81; --flare-dim:#7A3540; --flare-soft:rgba(255,107,129,0.12);
    --gradient-signal: linear-gradient(135deg, var(--cyan), var(--violet));
    --r-sm:10px; --r-md:16px; --r-lg:22px; --r-pill:999px;
    --safe-t: env(safe-area-inset-top, 0px); --safe-b: env(safe-area-inset-bottom, 0px);
    --safe-l: env(safe-area-inset-left, 0px); --safe-r: env(safe-area-inset-right, 0px);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0; overscroll-behavior-y:none;}
  body{
    background:var(--abyss); color:var(--frost); font-family:'Inter',sans-serif;
    min-height:100vh; min-height:100dvh; -webkit-font-smoothing:antialiased;
    touch-action:manipulation;
    background-image:
      radial-gradient(ellipse 900px 500px at 50% -10%, rgba(155,123,255,0.14), transparent 60%),
      radial-gradient(ellipse 700px 400px at 90% 10%, rgba(79,227,208,0.10), transparent 60%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, transparent 1px, transparent 26px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.015) 0px, transparent 1px, transparent 26px);
    background-attachment:fixed;
  }
  ::selection{background:var(--cyan); color:var(--abyss);}
  a{color:var(--cyan); text-decoration:none;}
  button{font-family:inherit; -webkit-appearance:none; appearance:none;}
  input{font-family:inherit;}
  .disp{font-family:'Sora',sans-serif;} .mono{font-family:'JetBrains Mono',monospace;}
  ::-webkit-scrollbar{width:8px; height:8px;} ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--hairline); border-radius:4px;}

  /* ===== Top bar ===== */
  .topbar{
    position:sticky; top:0; z-index:60;
    padding:calc(12px + var(--safe-t)) 16px 12px;
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    background:rgba(8,11,20,0.72); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
    border-bottom:1px solid var(--hairline-soft);
  }
  .brand{display:flex; align-items:center; gap:10px;}
  .orbit{position:relative; width:34px; height:34px; flex-shrink:0;}
  .orbit .ring{
    position:absolute; inset:0; border-radius:50%;
    background:conic-gradient(from 0deg, var(--cyan), var(--violet), transparent 70%);
    animation:spin 4s linear infinite; mask:radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 2px));
    -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 3px), #000 calc(100% - 2px));
  }
  .orbit .core{
    position:absolute; inset:5px; border-radius:50%; background:var(--abyss);
    display:flex; align-items:center; justify-content:center;
    font-family:'Sora',sans-serif; font-weight:700; font-size:12px; color:var(--frost);
  }
  @keyframes spin{to{transform:rotate(360deg);}}
  .brand .name{font-family:'Sora',sans-serif; font-weight:700; font-size:16.5px; letter-spacing:0.3px; line-height:1;}
  .brand .sub{font-size:9.5px; color:var(--mist-dim); letter-spacing:1.4px; text-transform:uppercase; margin-top:3px;}
  .topbar-actions{display:flex; align-items:center; gap:8px;}
  .icon-btn{
    width:36px; height:36px; border-radius:var(--r-pill); border:1px solid var(--hairline);
    background:var(--panel); color:var(--mist); display:flex; align-items:center; justify-content:center;
    cursor:pointer; transition:border-color .15s, color .15s;
  }
  .icon-btn:active{transform:scale(0.94);}
  .icon-btn.hasWarn{position:relative;}
  .icon-btn.hasWarn::after{content:'';position:absolute; top:6px; right:6px; width:6px; height:6px; border-radius:50%; background:var(--flare); box-shadow:0 0 0 2px var(--panel);}

  /* ===== Layout ===== */
  .shell{max-width:640px; margin:0 auto; padding:0 14px calc(90px + var(--safe-b)); padding-left:calc(14px + var(--safe-l)); padding-right:calc(14px + var(--safe-r));}

  /* ===== Search ===== */
  .search-wrap{margin-top:14px; position:relative; border-radius:var(--r-pill); padding:1.5px; background:var(--hairline);}
  .search-wrap.focused{background:var(--gradient-signal); box-shadow:0 0 24px -6px rgba(155,123,255,0.5);}
  .search-inner{
    display:flex; align-items:center; gap:8px; background:var(--panel); border-radius:var(--r-pill);
    padding:4px 6px 4px 16px;
  }
  .search-inner svg{flex-shrink:0; opacity:0.55;}
  #searchInput{
    flex:1; background:none; border:none; outline:none; color:var(--frost);
    padding:13px 4px; font-size:15px; font-family:'JetBrains Mono',monospace; min-width:0;
  }
  #searchInput::placeholder{color:var(--mist-dim);}
  .clear-x{background:none; border:none; color:var(--mist); cursor:pointer; font-size:15px; padding:8px; display:none; border-radius:50%;}
  .clear-x:active{background:var(--panel-2);}
  .icon-btn-inline{background:none; border:none; color:var(--mist); cursor:pointer; padding:8px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0;}
  .icon-btn-inline:active{background:var(--panel-2);}
  .icon-btn-inline.active{color:var(--cyan);}
  .btn-search{
    background:var(--gradient-signal); color:#071019; border:none; border-radius:var(--r-pill);
    font-family:'Sora',sans-serif; font-weight:700; font-size:13px; letter-spacing:0.2px;
    padding:12px 20px; cursor:pointer; white-space:nowrap; flex-shrink:0;
    transition:filter .15s, transform .1s;
  }
  .btn-search:active{transform:scale(0.96); filter:brightness(0.95);}
  .btn-search:disabled{opacity:0.5;}

  /* ===== Filter field row ===== */
  .filter-row{display:flex; gap:8px; margin-top:12px; overflow-x:auto; padding-bottom:2px; scrollbar-width:none;}
  .filter-row::-webkit-scrollbar{display:none;}
  .filter-field{position:relative; flex-shrink:0;}
  .filter-trigger{
    display:flex; align-items:center; gap:7px; background:var(--panel); border:1px solid var(--hairline);
    color:var(--frost); border-radius:var(--r-pill); padding:9px 14px; font-size:12.5px; font-weight:500;
    cursor:pointer; white-space:nowrap; transition:border-color .15s, background .15s;
  }
  .filter-trigger .chev{font-size:9px; color:var(--mist); transition:transform .2s;}
  .filter-trigger.active{border-color:var(--cyan-dim); background:var(--cyan-soft); color:var(--cyan);}
  .filter-trigger.active .chev{color:var(--cyan);}
  .filter-trigger.open .chev{transform:rotate(180deg);}
  .filter-trigger:active{transform:scale(0.97);}

  .filter-backdrop{position:fixed; inset:0; background:rgba(4,6,12,0.55); backdrop-filter:blur(2px); z-index:70; opacity:0; pointer-events:none; transition:opacity .2s;}
  .filter-backdrop.show{opacity:1; pointer-events:auto;}

  .filter-panel{
    position:fixed; left:0; right:0; bottom:0; z-index:80;
    background:var(--panel); border-top-left-radius:var(--r-lg); border-top-right-radius:var(--r-lg);
    border:1px solid var(--hairline-soft); border-bottom:none;
    padding:8px 6px calc(18px + var(--safe-b)); max-height:70vh; overflow-y:auto;
    transform:translateY(105%); transition:transform .28s cubic-bezier(.32,.72,0,1);
    box-shadow:0 -20px 60px -10px rgba(0,0,0,0.6);
  }
  .filter-panel.open{transform:translateY(0);}
  .filter-panel .grabber{width:36px; height:4px; border-radius:2px; background:var(--hairline); margin:6px auto 12px;}
  .filter-panel .fp-head{display:flex; align-items:center; justify-content:space-between; padding:0 12px 10px; border-bottom:1px solid var(--hairline-soft); margin-bottom:6px;}
  .filter-panel .fp-title{font-family:'Sora',sans-serif; font-weight:700; font-size:14px;}
  .filter-panel .fp-link{background:none; border:none; color:var(--cyan); font-size:11.5px; font-family:'JetBrains Mono',monospace; cursor:pointer; padding:4px;}
  .fp-option{
    display:flex; align-items:center; gap:11px; padding:12px; border-radius:var(--r-sm); cursor:pointer;
    -webkit-user-select:none; user-select:none; transition:background .12s;
  }
  .fp-option:active{background:var(--panel-2);}
  .fp-option input{accent-color:var(--cyan); width:18px; height:18px; cursor:pointer; flex-shrink:0;}
  .fp-option .dot{width:9px; height:9px; border-radius:3px; flex-shrink:0;}
  .fp-option .lbl{font-size:14px; color:var(--frost); flex:1;}
  .fp-option .flagc{font-size:17px;}
  .fp-option .kind{font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--mist); border:1px solid var(--hairline); padding:2px 6px; border-radius:8px; text-transform:uppercase;}
  .fp-option .kind.real{color:var(--cyan); border-color:var(--cyan-dim);}
  .fp-option.selected{background:var(--cyan-soft);}
  .fp-option .check-ring{width:20px; height:20px; border-radius:50%; border:1.5px solid var(--hairline); flex-shrink:0; display:flex; align-items:center; justify-content:center;}
  .fp-option.selected .check-ring{border-color:var(--cyan); background:var(--cyan);}
  .fp-option.selected .check-ring::after{content:''; width:9px; height:6px; border-left:2px solid var(--abyss); border-bottom:2px solid var(--abyss); transform:rotate(-45deg) translate(1px,-1px);}

  @media (min-width:760px){
    .filter-backdrop{display:none;}
    .filter-panel{
      position:absolute; left:0; right:auto; bottom:auto; top:calc(100% + 8px);
      width:280px; max-height:400px; border-radius:var(--r-md); border:1px solid var(--hairline-soft);
      transform:translateY(-8px) scale(0.97); opacity:0; pointer-events:none; transition:transform .18s ease, opacity .18s ease;
      padding:8px 6px 10px;
    }
    .filter-panel.open{transform:translateY(0) scale(1); opacity:1; pointer-events:auto;}
    .filter-panel .grabber{display:none;}
    /* settings sheet is appended to <body>, not inside a .filter-field, so it needs its own
       fixed anchor near the gear icon rather than the generic absolute/parent-relative rule above */
    #panel-settings{
      position:fixed !important; left:auto !important; right:16px; bottom:auto; top:58px;
      width:320px; max-height:min(520px, 80vh);
      transform-origin: top right; transform:translateY(-6px) scale(0.97);
    }
    #panel-settings.open{ transform:translateY(0) scale(1); }
  }

  /* ===== Ticker ===== */
  .ticker-wrap{
    background:var(--panel); border:1px solid var(--hairline-soft); border-radius:var(--r-md);
    padding:10px 12px; margin-top:12px; min-height:20px; display:flex; align-items:center; gap:7px; flex-wrap:wrap;
  }
  .ticker-label{font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--mist-dim); letter-spacing:1px; text-transform:uppercase; display:flex; align-items:center; margin-right:2px; gap:5px;}
  .pulse-dot{width:5px; height:5px; border-radius:50%; background:var(--cyan); animation:pulse 2.2s infinite;}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(79,227,208,0.55);}70%{box-shadow:0 0 0 6px rgba(79,227,208,0);}100%{box-shadow:0 0 0 0 rgba(79,227,208,0);}}
  .chip{font-family:'JetBrains Mono',monospace; font-size:10.5px; padding:3px 9px; border-radius:var(--r-pill); border:1px solid var(--hairline); color:var(--mist); background:var(--panel-2); white-space:nowrap;}
  .chip.op{color:var(--violet); border-color:var(--violet-dim); background:var(--violet-soft); font-weight:600;}
  .chip.must{color:var(--cyan); border-color:var(--cyan-dim); background:var(--cyan-soft);}
  .chip.ignore{color:var(--flare); border-color:var(--flare-dim); background:var(--flare-soft); text-decoration:line-through; text-decoration-color:rgba(255,107,129,0.5);}
  .chip.empty{color:var(--mist-dim); background:none; border-style:dashed;}

  /* ===== Active filters + meta ===== */
  .active-filters{display:flex; gap:6px; flex-wrap:wrap; margin-top:10px;}
  .fchip{display:flex; align-items:center; gap:5px; font-size:10.5px; font-family:'JetBrains Mono',monospace; padding:4px 6px 4px 10px; border-radius:var(--r-pill); background:var(--panel-2); border:1px solid var(--hairline); color:var(--mist);}
  .fchip button{background:none; border:none; color:var(--mist-dim); cursor:pointer; font-size:13px; padding:0 4px; line-height:1;}

  .results-meta{display:flex; align-items:center; justify-content:space-between; padding:16px 2px 8px; margin-top:6px; font-size:11.5px; color:var(--mist); flex-wrap:wrap; gap:6px;}
  .results-meta .count b{color:var(--frost); font-family:'JetBrains Mono',monospace; font-weight:600;}
  .results-meta .sortlabel{font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--mist-dim);}
  .errors-box{background:var(--flare-soft); border:1px solid var(--flare-dim); border-radius:var(--r-md); padding:10px 12px; font-size:11px; color:var(--mist); margin-top:10px; font-family:'JetBrains Mono',monospace; line-height:1.7;}

  /* ===== Result cards ===== */
  .results-list{display:flex; flex-direction:column; gap:10px; margin-top:10px;}
  .card{
    background:var(--panel); border:1px solid var(--hairline-soft); border-radius:var(--r-md);
    padding:14px 15px 13px; opacity:0; transform:translateY(8px); animation:cardIn .4s cubic-bezier(.22,1,.36,1) forwards;
  }
  @keyframes cardIn{to{opacity:1; transform:translateY(0);}}
  .card-top{display:flex; align-items:center; gap:8px; margin-bottom:9px; flex-wrap:wrap;}
  .plat-badge{display:flex; align-items:center; gap:6px; font-family:'Sora',sans-serif; font-weight:600; font-size:12px;}
  .plat-mono{width:22px; height:22px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:10.5px; font-weight:700; color:#071019; flex-shrink:0;}
  .src-name{color:var(--mist-dim); font-family:'JetBrains Mono',monospace; font-weight:400; font-size:11px;}
  .flag-country{font-size:13px;} .country-name{font-size:10.5px; color:var(--mist-dim); font-family:'JetBrains Mono',monospace;}
  .time-ago{margin-left:auto; font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--mist-dim); white-space:nowrap;}
  .ext-tag{font-size:8.5px; font-family:'JetBrains Mono',monospace; padding:2px 6px; border-radius:var(--r-pill); text-transform:uppercase; letter-spacing:0.4px;}
  .ext-tag.discovery{color:var(--violet); border:1px solid var(--violet-dim); background:var(--violet-soft);}
  .ext-tag.direct{color:var(--cyan); border:1px solid var(--cyan-dim); background:var(--cyan-soft);}
  .card-title{font-size:14.5px; font-weight:600; color:var(--frost); margin-bottom:5px; line-height:1.4;}
  .card-title a{color:inherit;} .card-title a:active{color:var(--cyan);}
  .card-snippet{font-size:13px; color:var(--mist); line-height:1.6; margin-bottom:9px;}
  .card-snippet mark{background:rgba(79,227,208,0.24); color:var(--frost); border-radius:3px; padding:0 2px;}
  .matched-row{display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-bottom:10px;}
  .matched-row .mlabel{font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--mist-dim); text-transform:uppercase; letter-spacing:1px;}
  .matched-row .chip{padding:2px 8px; font-size:10px;}
  .card-extra{font-size:12.5px; color:var(--mist); line-height:1.65; margin:0 0 10px; padding:11px 12px; background:var(--panel-2); border-left:2px solid var(--violet); border-radius:8px; display:none; white-space:pre-wrap; max-height:260px; overflow-y:auto;}
  .card-extra.open{display:block;}
  .card-bottom{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
  .card-actions{margin-left:auto; display:flex; gap:8px; flex-wrap:wrap;}
  .btn-ghost{
    font-family:'JetBrains Mono',monospace; font-size:11px; padding:9px 13px; border-radius:var(--r-pill);
    background:var(--panel-2); border:1px solid var(--hairline); color:var(--mist); cursor:pointer;
    display:inline-flex; align-items:center; gap:5px; transition:border-color .15s, color .15s;
  }
  .btn-ghost:active{transform:scale(0.96);}
  .btn-ghost.primary{border-color:var(--cyan-dim); color:var(--cyan); background:var(--cyan-soft);}
  .btn-ghost:disabled{opacity:0.45;}

  .empty-state, .zero-state{text-align:center; padding:70px 20px 40px; color:var(--mist);}
  .empty-state .orbit-lg{width:56px; height:56px; margin:0 auto 18px; position:relative;}
  .empty-state .orbit-lg .ring{position:absolute; inset:0; border-radius:50%; background:conic-gradient(from 0deg, var(--cyan), var(--violet), transparent 70%); animation:spin 6s linear infinite; mask:radial-gradient(farthest-side, transparent calc(100% - 2px), #000 calc(100% - 1px)); -webkit-mask:radial-gradient(farthest-side, transparent calc(100% - 2px), #000 calc(100% - 1px)); opacity:0.5;}
  .empty-state .disp, .zero-state .disp{font-size:17px; font-weight:600; color:var(--frost); margin-bottom:6px;}
  .empty-state p, .zero-state p{font-size:13px; max-width:380px; margin:0 auto; line-height:1.7; color:var(--mist);}
  .empty-state b{color:var(--cyan); font-weight:600;}

  .loading-wrap{padding:60px 20px; display:flex; flex-direction:column; align-items:center; gap:14px;}
  .radar{width:64px; height:64px; position:relative;}
  .radar .sweep{position:absolute; inset:0; border-radius:50%; background:conic-gradient(from 0deg, transparent, var(--cyan) 15%, transparent 30%); animation:spin 1.1s linear infinite;}
  .radar .ringstatic{position:absolute; inset:8px; border-radius:50%; border:1px solid var(--hairline-soft);}
  .radar .ringstatic2{position:absolute; inset:18px; border-radius:50%; border:1px solid var(--hairline-soft);}
  .loading-wrap .ltext{font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--mist); letter-spacing:0.5px;}

  .discord-card{background:var(--panel); border:1px solid var(--hairline-soft); border-radius:var(--r-md); padding:14px 15px; margin-top:10px;}
  .discord-card .dc-title{font-family:'Sora',sans-serif; font-weight:600; font-size:13px; margin-bottom:6px; display:flex; align-items:center; gap:7px;}
  .discord-card p{font-size:12.5px; color:var(--mist); line-height:1.7; margin:0 0 8px;}
  .discord-card code{background:var(--panel-2); padding:2px 6px; border-radius:5px; color:var(--cyan); font-family:'JetBrains Mono',monospace; font-size:11.5px;}

  /* ===== Settings sheet (quota + syntax help) ===== */
  .settings-body{padding:4px 12px 4px;}
  .settings-section{margin-bottom:18px;}
  .settings-section h4{font-family:'Sora',sans-serif; font-size:11px; letter-spacing:1.2px; text-transform:uppercase; color:var(--mist-dim); margin:0 0 10px;}
  .qrow{display:flex; align-items:center; gap:10px; padding:8px 0; font-size:12.5px; color:var(--mist);}
  .qrow .qname{width:88px; flex-shrink:0; font-family:'JetBrains Mono',monospace; font-size:11px;}
  .qbar{flex:1; height:6px; border-radius:3px; background:var(--hairline-soft); overflow:hidden;}
  .qbar i{display:block; height:100%; background:var(--cyan);}
  .qbar.warn i{background:#F0B429;} .qbar.crit i{background:var(--flare);}
  .qrow .qnum{font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--mist-dim); width:64px; text-align:right; flex-shrink:0;}
  .syntax-box{background:var(--panel-2); border:1px solid var(--hairline); border-radius:var(--r-sm); padding:11px 12px; font-size:11.5px; color:var(--mist); line-height:1.9; font-family:'JetBrains Mono',monospace;}
  .syntax-box b{color:var(--violet); font-weight:600;} .syntax-box .ex{color:var(--cyan);}

  .save-row{display:flex; gap:8px; margin-bottom:14px;}
  .save-row input{
    flex:1; background:var(--panel-2); border:1px solid var(--hairline); border-radius:var(--r-sm);
    padding:11px 12px; color:var(--frost); font-size:13px; font-family:'Inter',sans-serif; min-width:0; outline:none;
  }
  .save-row input:focus{border-color:var(--cyan-dim);}
  .save-row button{
    background:var(--gradient-signal); color:#071019; border:none; border-radius:var(--r-sm);
    font-family:'Sora',sans-serif; font-weight:700; font-size:12.5px; padding:0 16px; cursor:pointer; flex-shrink:0;
  }
  .save-row button:active{transform:scale(0.96);}
  .saved-empty{font-size:12.5px; color:var(--mist-dim); padding:10px 4px; font-family:'Inter',sans-serif;}
  .saved-item{display:flex; align-items:center; gap:10px; padding:11px 10px; border-radius:var(--r-sm); cursor:pointer; transition:background .12s;}
  .saved-item:active{background:var(--panel-2);}
  .saved-item .si-main{flex:1; min-width:0;}

<script>
// Backend API base URL — change this if you deploy the backend elsewhere
const API_BASE = 'https://signal2-olcz.onrender.com';

const PLATFORMS = [
  {id:'reddit', name:'Reddit', mono:'r/', color:'#4FE3D0', kind:'real'},
  {id:'x', name:'X / Twitter', mono:'𝕏', color:'#C7D0EA', kind:'launcher'},
  {id:'facebook', name:'Facebook', mono:'f', color:'#7C93D6', kind:'launcher'},
  {id:'linkedin', name:'LinkedIn', mono:'in', color:'#4FE3D0', kind:'launcher'},
  {id:'craigslist', name:'Craigslist', mono:'CL', color:'#FF6B81', kind:'real'},
  {id:'web', name:'General Web', mono:'W', color:'#8B96B8', kind:'real'},
  {id:'university', name:'University Research', mono:'Æ', color:'#9B7BFF', kind:'real'},
];
const COUNTRIES = [
  {id:'us', name:'United States', flag:'🇺🇸'},
  {id:'uk', name:'United Kingdom', flag:'🇬🇧'},
  {id:'ca', name:'Canada', flag:'🇨🇦'},
  {id:'au', name:'Australia', flag:'🇦🇺'},
];
const TIME_RANGES = [
  {id:'all', label:'All time'}, {id:'1h', label:'Past hour'}, {id:'1d', label:'Past day'},
  {id:'1w', label:'Past week'}, {id:'1m', label:'Past month'},
];
const SORTS = [
  {id:'relevance', label:'Relevance'}, {id:'newest', label:'Newest first'},
];

let state = {
  platforms: new Set(PLATFORMS.map(p=>p.id)),
  countries: new Set(COUNTRIES.map(c=>c.id)),
  timeRange: 'all', sort: 'relevance', query: '', searched: false,
  launcherLinks: {}, openPanel: null, savedItems: [], lastResultsById: {},
};

/* ---- client-side parser preview (real filtering happens server-side) ---- */
function extractMustIgnore(raw){
  let text=raw; const must=[]; const ignore=[];
  text=text.replace(/must\s+include\s*\(([^)]+)\)/gi,(m,g)=>{must.push(g.trim());return ' ';});
  text=text.replace(/ignore\s*\(([^)]+)\)/gi,(m,g)=>{ignore.push(g.trim());return ' ';});
  text=text.replace(/(^|\s)\+([a-zA-Z0-9_-]+)/g,(m,pre,g)=>{must.push(g.trim());return ' ';});
  text=text.replace(/(^|\s)-([a-zA-Z0-9_-]+)/g,(m,pre,g)=>{ignore.push(g.trim());return ' ';});
  return {core:text.trim(), must, ignore};
}
function tokenize(str){const tokens=[];let i=0;while(i<str.length){const c=str[i];if(/\s/.test(c)){i++;continue;}if(c==='('||c===')'){tokens.push(c);i++;continue;}let j=i;while(j<str.length&&!/\s|\(|\)/.test(str[j]))j++;tokens.push(str.slice(i,j));i=j;}return tokens;}
function parseExpr(tokens,pos){let [left,p1]=parseTerm(tokens,pos);pos=p1;while(pos<tokens.length&&tokens[pos]&&tokens[pos].toUpperCase()==='OR'){pos++;let [right,p2]=parseTerm(tokens,pos);left={op:'OR',left,right};pos=p2;}return [left,pos];}
function parseTerm(tokens,pos){let [left,p1]=parseFactor(tokens,pos);pos=p1;while(pos<tokens.length&&tokens[pos]!==')'&&tokens[pos].toUpperCase()!=='OR'){if(tokens[pos].toUpperCase()==='AND')pos++;if(pos>=tokens.length||tokens[pos]===')')break;let [right,p2]=parseFactor(tokens,pos);left={op:'AND',left,right};pos=p2;}return [left,pos];}
function parseFactor(tokens,pos){if(tokens[pos]==='('){let [e,p1]=parseExpr(tokens,pos+1);if(tokens[p1]===')')p1++;return [e,p1];}const val=(tokens[pos]||'').toLowerCase();return [{op:'WORD',value:val},pos+1];}
function parseCore(coreStr){if(!coreStr.trim())return null;const tokens=tokenize(coreStr);if(tokens.length===0)return null;const [tree]=parseExpr(tokens,0);return tree;}
function parseQueryPreview(raw){const {core,must,ignore}=extractMustIgnore(raw);let tree=null;try{tree=parseCore(core);}catch(e){tree=null;}return {tree,must,ignore};}
function renderNodeChips(node){if(!node)return '';if(node.op==='WORD')return `<span class="chip">${escapeHtml(node.value)}</span>`;if(node.op==='AND')return `${renderNodeChips(node.left)}<span class="chip op">AND</span>${renderNodeChips(node.right)}`;if(node.op==='OR')return `${renderNodeChips(node.left)}<span class="chip op">OR</span>${renderNodeChips(node.right)}`;return '';}
function escapeHtml(s){return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function renderTicker(raw){
  const {tree,must,ignore}=parseQueryPreview(raw);
  const el=document.getElementById('tickerWrap');
  let inner=`<span class="ticker-label"><span class="pulse-dot"></span>parsed</span>`;
  let any=false;
  if(tree){inner+=renderNodeChips(tree);any=true;}
  must.forEach(m=>{inner+=`<span class="chip must">+MUST ${escapeHtml(m)}</span>`;any=true;});
  ignore.forEach(g=>{inner+=`<span class="chip ignore">−IGNORE ${escapeHtml(g)}</span>`;any=true;});
  if(!any) inner+=`<span class="chip empty">type a query to preview logic</span>`;
  el.innerHTML=inner;
}

/* ---- dropdown filter fields ---- */
function fieldLabel(kind){
  if(kind==='platforms'){
    const n=state.platforms.size;
    if(n===PLATFORMS.length) return 'Platforms · All';
    if(n===0) return 'Platforms · None';
    return `Platforms · ${n}`;
  }
  if(kind==='countries'){
    const n=state.countries.size;
    if(n===COUNTRIES.length) return 'Countries · All';
    if(n===0) return 'Countries · None';
    if(n===1) return COUNTRIES.find(c=>state.countries.has(c.id)).name;
    return `Countries · ${n}`;
  }
  if(kind==='time') return TIME_RANGES.find(t=>t.id===state.timeRange).label;
  if(kind==='sort') return SORTS.find(s=>s.id===state.sort).label;
}

function buildFilterRow(){
  const fields = [
    {kind:'platforms', title:'Platforms'},
    {kind:'countries', title:'Countries'},
    {kind:'time', title:'Posted within'},
    {kind:'sort', title:'Sort by'},
  ];
  document.getElementById('filterRow').innerHTML = fields.map(f => `
    <div class="filter-field" data-kind="${f.kind}">
      <button class="filter-trigger" data-action="toggle-panel" data-kind="${f.kind}" id="trigger-${f.kind}">
        <span id="label-${f.kind}">${fieldLabel(f.kind)}</span><span class="chev">▾</span>
      </button>
      <div class="filter-panel" id="panel-${f.kind}"></div>
    </div>
  `).join('');
  fields.forEach(f => renderPanelContent(f.kind));
  updateAllLabels();
}

function panelHeader(title, withSelectAll, kind){
  return `<div class="grabber"></div>
    <div class="fp-head">
      <span class="fp-title">${title}</span>
      ${withSelectAll ? `<button class="fp-link" data-action="toggle-all" data-kind="${kind}">select all / none</button>` : `<button class="fp-link" data-action="close-panel">done</button>`}
    </div>`;
}

function renderPanelContent(kind){
  const panel = document.getElementById('panel-'+kind);
  if(kind==='platforms'){
    panel.innerHTML = panelHeader('Platforms', true, 'platforms') + PLATFORMS.map(p=>`
      <div class="fp-option ${state.platforms.has(p.id)?'selected':''}" data-action="toggle-platform" data-id="${p.id}">
        <div class="check-ring"></div>
        <span class="dot" style="background:${p.color}"></span>
        <span class="lbl">${p.name}</span>
        <span class="kind ${p.kind}">${p.kind==='real'?'live':'launcher'}</span>
      </div>`).join('');
  }
  if(kind==='countries'){
    panel.innerHTML = panelHeader('Countries', true, 'countries') + COUNTRIES.map(c=>`
      <div class="fp-option ${state.countries.has(c.id)?'selected':''}" data-action="toggle-country" data-id="${c.id}">
        <div class="check-ring"></div>
        <span class="flagc">${c.flag}</span>
        <span class="lbl">${c.name}</span>
      </div>`).join('');
  }
  if(kind==='time'){
    panel.innerHTML = panelHeader('Posted within', false) + TIME_RANGES.map(t=>`
      <div class="fp-option ${state.timeRange===t.id?'selected':''}" data-action="set-time" data-id="${t.id}">
        <div class="check-ring"></div><span class="lbl">${t.label}</span>
      </div>`).join('');
  }
  if(kind==='sort'){
    panel.innerHTML = panelHeader('Sort by', false) + SORTS.map(s=>`
      <div class="fp-option ${state.sort===s.id?'selected':''}" data-action="set-sort" data-id="${s.id}">
        <div class="check-ring"></div><span class="lbl">${s.label}</span>
      </div>`).join('');
  }
}

function updateAllLabels(){
  ['platforms','countries','time','sort'].forEach(kind=>{
    const labelEl = document.getElementById('label-'+kind);
    if(labelEl) labelEl.textContent = fieldLabel(kind);
    const trig = document.getElementById('trigger-'+kind);
    if(trig){
      const isDefault = (kind==='platforms' && state.platforms.size===PLATFORMS.length)
        || (kind==='countries' && state.countries.size===COUNTRIES.length)
        || (kind==='time' && state.timeRange==='all')
        || (kind==='sort' && state.sort==='relevance');
      trig.classList.toggle('active', !isDefault);
    }
  });
}

function togglePanel(kind){
  if(state.openPanel === kind){ closePanel(); return; }
  closePanel();
  state.openPanel = kind;
  document.getElementById('panel-'+kind).classList.add('open');
  document.getElementById('trigger-'+kind).classList.add('open');
  document.getElementById('filterBackdrop').classList.add('show');
}
function closePanel(){
  if(!state.openPanel) return;
  document.getElementById('panel-'+state.openPanel).classList.remove('open');
  const trig = document.getElementById('trigger-'+state.openPanel);
  if(trig) trig.classList.remove('open');
  if(state.openPanel === 'saved') document.getElementById('savedBtn').classList.remove('active');
  document.getElementById('filterBackdrop').classList.remove('show');
  state.openPanel = null;
}

function togglePlatform(id){
  state.platforms.has(id) ? state.platforms.delete(id) : state.platforms.add(id);
  renderPanelContent('platforms'); updateAllLabels(); onControlsChanged();
}
function toggleCountry(id){
  state.countries.has(id) ? state.countries.delete(id) : state.countries.add(id);
  renderPanelContent('countries'); updateAllLabels(); onControlsChanged();
}
function toggleAll(kind){
  if(kind==='platforms'){ state.platforms.size===PLATFORMS.length ? state.platforms.clear() : state.platforms=new Set(PLATFORMS.map(p=>p.id)); renderPanelContent('platforms'); }
  if(kind==='countries'){ state.countries.size===COUNTRIES.length ? state.countries.clear() : state.countries=new Set(COUNTRIES.map(c=>c.id)); renderPanelContent('countries'); }
  updateAllLabels(); onControlsChanged();
}
function setTimeRange(id){ state.timeRange=id; renderPanelContent('time'); updateAllLabels(); closePanel(); onControlsChanged(); }
function setSort(id){ state.sort=id; renderPanelContent('sort'); updateAllLabels(); closePanel(); onControlsChanged(); }
function removePlatform(id){ state.platforms.delete(id); renderPanelContent('platforms'); updateAllLabels(); onControlsChanged(); }
function removeCountry(id){ state.countries.delete(id); renderPanelContent('countries'); updateAllLabels(); onControlsChanged(); }

function renderActiveFilters(){
  let chips=[];
  if(state.platforms.size < PLATFORMS.length){
    PLATFORMS.forEach(p=>{if(state.platforms.has(p.id))chips.push(`<span class="fchip">${p.name}<button data-action="remove-platform" data-id="${p.id}">✕</button></span>`);});
  }
  if(state.countries.size < COUNTRIES.length){
    COUNTRIES.forEach(c=>{if(state.countries.has(c.id))chips.push(`<span class="fchip">${c.flag} ${c.name}<button data-action="remove-country" data-id="${c.id}">✕</button></span>`);});
  }
  document.getElementById('activeFilters').innerHTML = chips.join('');
}

/* ---- settings sheet (quota + syntax) reuses the same panel system ---- */
function openSettings(){
  closePanel();
  let sheet = document.getElementById('panel-settings');
  if(!sheet){
    sheet = document.createElement('div');
    sheet.className = 'filter-panel'; sheet.id = 'panel-settings';
    sheet.style.maxHeight = '80vh';
    document.body.appendChild(sheet);
  }
  sheet.innerHTML = panelHeader('Settings', false) + `<div class="settings-body">
    <div class="settings-section">
      <h4>Connected accounts</h4>
      <div id="accountsList"></div>
      <div class="acct-note">"Sign in" opens the platform's real login page in a new tab — we never see or store your password. The checkbox is just a personal reminder for this device; it doesn't verify anything.</div>
    </div>
    <div class="settings-section">
      <h4>Provider quota — this month</h4>
      <div id="quotaRows"><span class="mono" style="color:var(--mist-dim); font-size:11.5px;">loading…</span></div>
    </div>
    <div class="settings-section">
      <h4>Query syntax</h4>
      <div class="syntax-box">
        <div><b>AND</b> — both required <span class="ex">grad students AND survey</span></div>
        <div><b>OR</b> — either match <span class="ex">(dogs OR cats)</span></div>
        <div><b>+word</b> — must include <span class="ex">+paid</span></div>
        <div><b>-word</b> — must exclude <span class="ex">-unpaid</span></div>
      </div>
    </div>
    <div class="settings-section">
      <h4>Discord</h4>
      <div class="syntax-box" style="font-family:'Inter',sans-serif; line-height:1.7;">
        Not searchable from this screen by design — run the bot separately, invite it to your own servers, then search inside Discord: <code style="font-family:'JetBrains Mono',monospace;">/signal-search query:(paid study OR focus group)</code>
      </div>
    </div>
  </div>`;
  state.openPanel = 'settings';
  sheet.classList.add('open');
  document.getElementById('filterBackdrop').classList.add('show');
  renderAccounts();
  refreshQuota();
}

/* ---- connected accounts (sign-in links + local reminder checkboxes only — no credentials ever pass through this app) ---- */
const ACCOUNTS = [
  {id:'reddit', name:'Reddit', mono:'r/', color:'#4FE3D0', loginUrl:'https://www.reddit.com/login'},
  {id:'x', name:'X / Twitter', mono:'𝕏', color:'#C7D0EA', loginUrl:'https://x.com/login'},
  {id:'facebook', name:'Facebook', mono:'f', color:'#7C93D6', loginUrl:'https://www.facebook.com/login'},
  {id:'linkedin', name:'LinkedIn', mono:'in', color:'#4FE3D0', loginUrl:'https://www.linkedin.com/login'},
  {id:'craigslist', name:'Craigslist', mono:'CL', color:'#FF6B81', loginUrl:'https://accounts.craigslist.org/login'},
  {id:'discord', name:'Discord', mono:'◈', color:'#9B7BFF', loginUrl:'https://discord.com/login'},
];

function safeStorageGet(key){
  try{ return JSON.parse(localStorage.getItem(key) || '{}'); }catch(e){ return {}; }
}
function safeStorageSet(key, val){
  try{ localStorage.setItem(key, JSON.stringify(val)); }catch(e){ /* storage unavailable in this WebView — silently no-op */ }
}

// Opens external platform links (sign-in, launcher search, source links) in a way that gives
// a real "back to Signal" affordance where possible:
// - If this page is running inside a Capacitor-wrapped APK with @capacitor/browser installed,
//   use its in-app browser, which renders its own header with a native "Done" button that
//   closes back to this app — this is the actual fix for "add a back button."
// - Otherwise, fall back to a normal new-tab/window open. Whether THAT preserves Signal in the
//   background (letting the phone's back button return to it) depends on the wrapper tool,
//   not on this code — see README "Sign-in back button" section.
function openExternal(url){
  const cap = window.Capacitor;
  if(cap && cap.Plugins && cap.Plugins.Browser && typeof cap.Plugins.Browser.open === 'function'){
    cap.Plugins.Browser.open({ url });
    return;
  }
  window.open(url, '_blank', 'noopener');
}

function renderAccounts(){
  const el = document.getElementById('accountsList');
  if(!el) return;
  const signedIn = safeStorageGet('signal_signed_in');
  el.innerHTML = ACCOUNTS.map(a => `
    <div class="acct-row">
      <span class="plat-mono" style="background:${a.color}">${a.mono}</span>
      <span class="acct-name">${a.name}</span>
      <label class="acct-signed">
        <input type="checkbox" data-action="toggle-signed-in" data-id="${a.id}" ${signedIn[a.id] ? 'checked' : ''}>
        signed in
      </label>
      <button class="btn-ghost" type="button" data-action="open-external" data-url="${escapeHtml(a.loginUrl)}">sign in ↗</button>
    </div>`).join('');
}

/* ---- saved keywords (persisted server-side, shared across whoever uses this backend) ---- */
async function openSaved(){
  closePanel();
  let sheet = document.getElementById('panel-saved');
  if(!sheet){
    sheet = document.createElement('div');
    sheet.className = 'filter-panel'; sheet.id = 'panel-saved';
    sheet.style.maxHeight = '80vh';
    document.body.appendChild(sheet);
  }
  sheet.innerHTML = panelHeader('Saved keywords', false) + `<div class="settings-body">
    <div class="save-row">
      <input id="saveLabelInput" placeholder="Name this search…" maxlength="60">
      <button data-action="save-current-query">Save current</button>
    </div>
    <div id="savedListArea"><span class="mono" style="color:var(--mist-dim); font-size:11.5px;">loading…</span></div>
  </div>`;
  state.openPanel = 'saved';
  sheet.classList.add('open');
  document.getElementById('filterBackdrop').classList.add('show');
  document.getElementById('savedBtn').classList.add('active');
  await refreshSavedList();
}

async function refreshSavedList(){
  const el = document.getElementById('savedListArea');
  if(!el) return;
  try{
    const res = await fetch(API_BASE + '/api/keywords');
    const items = await res.json();
    state.savedItems = items;
    el.innerHTML = items.length ? items.map(it => `
      <div class="saved-item" data-action="load-saved" data-id="${it.id}">
        <div class="si-main"><div class="si-label">${escapeHtml(it.label)}</div><div class="si-query">${escapeHtml(it.query)}</div></div>
        <button class="si-del" data-action="delete-saved" data-id="${it.id}">✕</button>
      </div>`).join('') : `<div class="saved-empty">No saved keywords yet — type a query above and tap Save current, or type a name here and save.</div>`;
  }catch(e){
    el.innerHTML = `<div class="saved-empty" style="color:var(--flare);">Backend not reachable — saved keywords need the server running.</div>`;
  }
}

async function saveCurrentQuery(){
  const labelInput = document.getElementById('saveLabelInput');
  const label = labelInput ? labelInput.value.trim() : '';
  const query = document.getElementById('searchInput').value.trim();
  if(!query){ if(labelInput){ labelInput.placeholder = 'Type a search above first…'; } return; }
  try{
    await fetch(API_BASE + '/api/keywords', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ label, query }) });
    if(labelInput) labelInput.value = '';
    await refreshSavedList();
  }catch(e){ /* backend unreachable — list refresh will surface the error state */ }
}

function loadSavedItem(id){
  const item = (state.savedItems || []).find(i => i.id === id);
  if(!item) return;
  document.getElementById('searchInput').value = item.query;
  document.getElementById('clearBtn').style.display = 'flex';
  renderTicker(item.query);
  closePanel();
  document.getElementById('savedBtn').classList.remove('active');
  runSearch();
}

async function deleteSavedItem(id){
  try{
    await fetch(API_BASE + '/api/keywords/'+id, { method:'DELETE' });
    await refreshSavedList();
  }catch(e){ /* ignore — list stays as-is if backend unreachable */ }
}

async function refreshQuota(){
  const el = document.getElementById('quotaRows');
  if(!el) return;
  try{
    const res = await fetch(API_BASE + '/api/quota');
    const q = await res.json();
    const items = Object.entries(q).filter(([k,v])=>v.budget>0);
    const warnBtn = document.getElementById('settingsBtn');
    let anyCrit = false;
    el.innerHTML = items.map(([k,v])=>{
      const pct = v.budget ? Math.min(100, Math.round(100*v.used/v.budget)) : 0;
      const cls = pct>90?'crit':pct>70?'warn':'';
      if(pct>90) anyCrit = true;
      return `<div class="qrow"><span class="qname">${k}</span><span class="qbar ${cls}"><i style="width:${pct}%"></i></span><span class="qnum">${v.used}/${v.budget}</span></div>`;
    }).join('') || '<span class="mono" style="color:var(--mist-dim); font-size:11.5px;">no metered providers configured</span>';
    warnBtn.classList.toggle('hasWarn', anyCrit);
  }catch(e){
    el.innerHTML = '<span class="mono" style="color:var(--flare); font-size:11.5px;">backend not reachable</span>';
  }
}

/* ---- search ---- */
function highlightKeywords(text, words){
  let out = escapeHtml(text);
  words.forEach(w=>{ if(!w) return; const re=new RegExp('('+w.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','ig'); out=out.replace(re,'<mark>$1</mark>'); });
  return out;
}
function formatTimeAgo(mins){
  if(mins===null||mins===undefined) return 'date unknown';
  if(mins<1) return 'just now';
  if(mins<60) return `${mins} min${mins===1?'':'s'} ago`;
  const hrs=Math.floor(mins/60); if(hrs<24) return `${hrs} hr${hrs===1?'':'s'} ago`;
  const days=Math.floor(hrs/24); if(days<7) return `${days} day${days===1?'':'s'} ago`;
  const weeks=Math.floor(days/7); if(weeks<5) return `${weeks} week${weeks===1?'':'s'} ago`;
  const months=Math.floor(days/30); return `${months} month${months===1?'':'s'} ago`;
}
function platformMeta(id){ return PLATFORMS.find(p=>p.id===id) || {name:id, mono:'?', color:'#888'}; }
function countryMeta(id){ return COUNTRIES.find(c=>c.id===id); }

function showLoading(){
  document.getElementById('resultsArea').innerHTML = `<div class="loading-wrap">
    <div class="radar"><div class="ringstatic"></div><div class="ringstatic2"></div><div class="sweep"></div></div>
    <div class="ltext">querying selected platforms…</div>
  </div>`;
  document.getElementById('resultsCount').textContent = 'Searching…';
  document.getElementById('errorsArea').innerHTML = '';
  document.getElementById('discordArea').innerHTML = '';
}

async function runSearch(){
  state.query = document.getElementById('searchInput').value;
  state.searched = true;
  document.getElementById('clearBtn').style.display = state.query ? 'flex' : 'none';
  renderActiveFilters();
  renderTicker(state.query);
  closePanel();

  if(state.platforms.size===0 || state.countries.size===0){
    document.getElementById('resultsCount').innerHTML = `<b>0</b> results`;
    document.getElementById('resultsArea').innerHTML = `<div class="zero-state"><div class="disp">Nothing selected</div><p>Choose at least one platform and one country from the filter fields above.</p></div>`;
    return;
  }

  showLoading();
  document.getElementById('searchBtn').disabled = true;

  const params = new URLSearchParams({
    query: state.query,
    platforms: [...state.platforms].join(','),
    countries: [...state.countries].join(','),
    timeRange: state.timeRange,
    sort: state.sort,
  });

  try{
    const res = await fetch(API_BASE + '/api/search?' + params.toString());
    const data = await res.json();
    state.launcherLinks = data.launcherLinks || {};
    renderResults(data);
    renderDiscordNote();
    refreshQuota();
  }catch(e){
    document.getElementById('resultsArea').innerHTML = `<div class="zero-state"><div class="disp">Backend unreachable</div><p>Make sure the server is running (<span class="mono">node server/server.js</span>) and try again.</p></div>`;
  }finally{
    document.getElementById('searchBtn').disabled = false;
  }
}

function renderDiscordNote(){
  if(!state.platforms.has('discord')) { document.getElementById('discordArea').innerHTML=''; return; }
  document.getElementById('discordArea').innerHTML = `<div class="discord-card">
    <div class="dc-title">◈ Discord</div>
    <p>Discord results come from the bot, not this screen — search live inside your servers with <code>/signal-search</code>.</p>
  </div>`;
}

function onControlsChanged(){ renderActiveFilters(); if(state.searched) runSearch(); }

function clearSearch(){
  document.getElementById('searchInput').value=''; state.query='';
  document.getElementById('clearBtn').style.display='none';
  if(state.searched) runSearch(); else renderTicker('');
}

function renderResults(data){
  const {results=[], errors=[]} = data;
  state.lastResultsById = {};
  results.forEach(r => { state.lastResultsById[r.id] = r; });
  document.getElementById('sortLabel').textContent = state.sort==='relevance' ? 'BY RELEVANCE' : 'BY NEWEST';
  document.getElementById('resultsCount').innerHTML = `<b>${results.length}</b> real result${results.length===1?'':'s'} · <b>${state.platforms.size}</b> platform${state.platforms.size===1?'':'s'}`;

  document.getElementById('errorsArea').innerHTML = errors.length
    ? `<div class="errors-box">${errors.map(e=>'⚠ '+escapeHtml(e)).join('<br>')}</div>` : '';

  const launcherOnlyCards = Object.entries(state.launcherLinks)
    .filter(([key]) => !key.startsWith('craigslist_'))
    .filter(([platId]) => !results.some(r => r.platform === platId))
    .map(([platId, url]) => renderLauncherCard(platId, url));

  const area = document.getElementById('resultsArea');
  if(results.length===0 && launcherOnlyCards.length===0){
    area.innerHTML = `<div class="zero-state"><div class="disp">No matches</div><p>Nothing found for this query/filter combination. Try loosening AND/MUST terms, removing an IGNORE term, or widening the time range.</p></div>`;
    return;
  }

  const words = (state.query||'').toLowerCase().match(/[a-z0-9]+/g) || [];
  area.innerHTML = `<div class="results-list">${
    results.map((r,i)=>renderCard(r,i,words)).join('') + launcherOnlyCards.join('')
  }</div>`;
}

function renderLauncherCard(platId, url){
  const p = platformMeta(platId);
  return `
  <div class="card">
    <div class="card-top">
      <div class="plat-badge"><span class="plat-mono" style="background:${p.color}">${p.mono}</span>${p.name}</div>
      <span class="ext-tag" style="color:var(--flare); border:1px solid var(--flare-dim); background:var(--flare-soft);">launcher only</span>
    </div>
    <div class="card-snippet">No official free API and no Google-indexed snippet matched this query on ${p.name}. Search directly with the same query logic carried over:</div>
    <div class="card-bottom"><div class="card-actions"><a class="btn-ghost primary" href="${url}" target="_blank" rel="noopener">search on ${p.name.split(' ')[0]} ↗</a></div></div>
  </div>`;
}

function renderCard(r, idx, words){
  const p = platformMeta(r.platform);
  const country = r.country ? countryMeta(r.country) : null;
  const titleHl = highlightKeywords(r.title, words);
  const snippetHl = highlightKeywords(r.snippet, words);
  const matched = words.filter(w => (r.title+' '+(r.snippet||'')).toLowerCase().includes(w));
  const kindTag = r.discovery ? `<span class="ext-tag discovery">discovery</span>` : `<span class="ext-tag direct">direct api</span>`;
  const launcherUrl = state.launcherLinks[r.platform] || state.launcherLinks[`craigslist_${r.country}`];

  return `
  <div class="card" style="animation-delay:${Math.min(idx*35,300)}ms">
    <div class="card-top">
      <div class="plat-badge"><span class="plat-mono" style="background:${p.color}">${p.mono}</span>${p.name}</div>
      <span class="src-name">${escapeHtml(r.source||'')}</span>
      ${kindTag}
      ${country ? `<span class="flag-country">${country.flag}</span><span class="country-name">${country.name}</span>` : ''}
      <span class="time-ago">${formatTimeAgo(r.minsAgo)}</span>
    </div>
    <div class="card-title"><a href="${r.url}" target="_blank" rel="noopener">${titleHl}</a></div>
    <div class="card-snippet">${snippetHl}</div>
    ${matched.length ? `<div class="matched-row"><span class="mlabel">matched</span>${matched.map(w=>`<span class="chip">${escapeHtml(w)}</span>`).join('')}</div>` : ''}
    <div class="card-extra" id="extra-${r.id}"></div>
    <div class="card-bottom">
      <div class="card-actions">
        <button class="btn-ghost" id="expandBtn-${r.id}" data-action="expand-result" data-id="${r.id}">expand ▾</button>
        <a class="btn-ghost primary" href="${r.url}" target="_blank" rel="noopener">source ↗</a>
        ${launcherUrl ? `<a class="btn-ghost" href="${launcherUrl}" target="_blank" rel="noopener">search on ${p.name.split(' ')[0]} ↗</a>` : ''}
      </div>
    </div>
  </div>`;
}

async function expandResult(id){
  const r = state.lastResultsById[id];
  if(!r) return;
  const extra = document.getElementById('extra-'+id);
  const btn = document.getElementById('expandBtn-'+id);
  if(extra.classList.contains('open')){ extra.classList.remove('open'); return; }
  btn.disabled = true; btn.textContent = 'fetching…';
  try{
    // country is passed through so the fetch is geo-targeted (helps with geo-restricted content)
    const res = await fetch(API_BASE + '/api/expand', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({url: r.url, country: r.country}) });
    const data = await res.json();
    if(data.error){ extra.textContent = 'Could not fetch full content: ' + data.error; }
    else { extra.textContent = (data.text || '(no extractable text)') + (data.fromCache ? '\n\n[cached]' : '') + (data.countryCode ? `\n[fetched via ${data.provider}, geo-targeted: ${data.countryCode}]` : (data.provider ? `\n[fetched via ${data.provider}]` : '')); }
    extra.classList.add('open');
  }catch(e){
    extra.textContent = 'Fetch failed: ' + e.message;
    extra.classList.add('open');
  }finally{
    btn.disabled = false; btn.textContent = 'expand ▾';
  }
}

/* ---- wiring ---- */
document.getElementById('searchInput').addEventListener('input', (e)=>{
  document.getElementById('clearBtn').style.display = e.target.value ? 'flex' : 'none';
  renderTicker(e.target.value);
});
document.getElementById('searchInput').addEventListener('focus', ()=>document.getElementById('searchWrap').classList.add('focused'));
document.getElementById('searchInput').addEventListener('blur', ()=>document.getElementById('searchWrap').classList.remove('focused'));
document.getElementById('searchInput').addEventListener('keydown', (e)=>{ if(e.key==='Enter'){ e.target.blur(); runSearch(); } });

// Single delegated click handler for every interactive element in the app — deliberately
// avoiding inline onclick="" attributes, which some WebView/APK-wrapping environments and
// stricter hosting setups block even though the page's own <script> block runs fine.
document.addEventListener('click', (e)=>{
  const el = e.target.closest('[data-action]');
  if(!el){
    // outside-click-to-close for desktop anchored dropdowns (mobile uses the backdrop instead)
    if(state.openPanel && window.innerWidth >= 760){
      const panel = document.getElementById('panel-'+state.openPanel);
      const trigger = document.getElementById('trigger-'+state.openPanel) || document.getElementById('settingsBtn') || document.getElementById('savedBtn');
      if(panel && !panel.contains(e.target) && trigger && !trigger.contains(e.target)) closePanel();
    }
    return;
  }
  const action = el.dataset.action;
  const id = el.dataset.id;
  const kind = el.dataset.kind;

  switch(action){
    case 'toggle-panel': togglePanel(kind); break;
    case 'toggle-all': toggleAll(kind); break;
    case 'close-panel': closePanel(); break;
    case 'toggle-platform': togglePlatform(id); break;
    case 'toggle-country': toggleCountry(id); break;
    case 'set-time': setTimeRange(id); break;
    case 'set-sort': setSort(id); break;
    case 'remove-platform': removePlatform(id); break;
    case 'remove-country': removeCountry(id); break;
    case 'clear-search': clearSearch(); break;
    case 'run-search': runSearch(); break;
    case 'open-settings': openSettings(); break;
    case 'open-saved': openSaved(); break;
    case 'save-current-query': saveCurrentQuery(); break;
    case 'load-saved': loadSavedItem(id); break;
    case 'delete-saved': e.stopPropagation(); deleteSavedItem(id); break;
    case 'expand-result': expandResult(id); break;
    case 'open-external': openExternal(el.dataset.url); break;
  }
});

document.addEventListener('change', (e)=>{
  const el = e.target.closest('[data-action="toggle-signed-in"]');
  if(!el) return;
  const signedIn = safeStorageGet('signal_signed_in');
  signedIn[el.dataset.id] = el.checked;
  safeStorageSet('signal_signed_in', signedIn);
});

document.getElementById('filterBackdrop').addEventListener('click', closePanel);
document.addEventListener('keydown', (e)=>{ if(e.key==='Escape') closePanel(); });

buildFilterRow();
renderActiveFilters();
renderTicker('');
refreshQuota();
</script>
